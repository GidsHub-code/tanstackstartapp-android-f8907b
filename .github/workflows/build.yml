name: Build Android App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Write google-services.json (enables Firebase Cloud Messaging)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret not set — FCM push will be disabled in this build."
            echo "Add it (raw JSON or base64) in repo Settings → Secrets and variables → Actions to enable push."
            exit 0
          fi
          # Accept either raw JSON or base64-encoded JSON
          if printf '%s' "$GOOGLE_SERVICES_JSON" | head -c 1 | grep -q '{'; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          fi
          echo "google-services.json written ($(wc -c < app/google-services.json) bytes) — Firebase plugin will activate."

      - name: Build debug APK and AAB
        run: ./gradlew --no-daemon assembleDebug bundleDebug --stacktrace

      - name: Build signed release APK and AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Release signing secrets are missing. Debug APK + AAB were still built."
            echo "Add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD to also build Play Store release artifacts."
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/git2app-release.jks"
          export KEYSTORE_PATH="$RUNNER_TEMP/git2app-release.jks"
          ./gradlew --no-daemon assembleRelease bundleRelease --stacktrace

      - name: Upload debug APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-aab
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error

      - name: Upload signed release APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk-aab
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore
